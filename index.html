function useReveal() {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold: 0.12 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, v];
}
function Reveal({ children, delay = 0 }) {
  const [ref, v] = useReveal();
  return <div ref={ref} style={{ opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(30px)", transition: `all .7s cubic-bezier(.22,1,.36,1) ${delay}s` }}>{children}</div>;
}
function Counter({ end, suffix = "", prefix = "" }) {
  const [c, setC] = useState(0); const ref = useRef(null); const started = useRef(false);
  useEffect(() => { const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting && !started.current) { started.current = true; let v = 0; const step = end / 60; const t = setInterval(() => { v += step; if (v >= end) { setC(end); clearInterval(t); } else setC(Math.floor(v)); }, 16); } }, { threshold: 0.5 }); if (ref.current) obs.observe(ref.current); return () => obs.disconnect(); }, [end]);
  return <span ref={ref}>{prefix}{c}{suffix}</span>;
}

              {[{n:"Amioun",d:"District center — full daily coverage",t:"core"},{n:"Beshmizzine",d:"Core zone — morning & afternoon",t:"core"},{n:"Kousba",d:"Core zone — afternoon slots",t:"core"},{n:"Chekka Corridor",d:"Extended zone — by appointment",t:"ext"},{n:"All 52 Villages",d:"District-wide Koura coverage",t:"ext"}].map(v => <div key={v.n} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: `1px solid ${C.grayLight}` }}><div style={{ width: 9, height: 9, borderRadius: "50%", background: v.t==="core"?C.blue:C.green, flexShrink: 0 }}/><div><div style={{ fontWeight: 600, fontSize: 14, color: C.charcoal }}>{v.n}</div><div style={{ fontSize: 11, color: C.gray }}>{v.d}</div></div></div>)}

              <h3 style={{ fontFamily: "Poppins", fontSize: 24, fontWeight: 800, color: C.charcoal, marginBottom: 14 }}>Your Driveway is Our Workspace</h3>
              <p style={{ fontSize: 14, color: C.gray, lineHeight: 1.75, marginBottom: 16 }}>We serve approximately 32,000 reachable vehicles across the entire Koura district. Our mobile team travels to homes, offices, compounds, and parking lots.</p>
              <p style={{ fontSize: 14, color: C.gray, lineHeight: 1.75, marginBottom: 20 }}>Not sure if we cover your area? Send a location pin on WhatsApp and we'll confirm instantly. Special "Compound Day" pricing for 5+ cars at the same location.</p>

          <Reveal>

            <p style={{ fontSize: 16, color: "rgba(255,255,255,.85)", marginBottom: 32, lineHeight: 1.75 }}>No app needed to get started. Just WhatsApp us your location, car type, and preferred time. We'll be at your doorstep within your chosen slot.</p>

            <div><div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}><LogoIcon size={26}/><span style={{ fontFamily: "Poppins", fontWeight: 800, fontSize: 15, color: C.green }}>Doorstep Car Wash</span></div><p style={{ fontSize: 12, color: "#6B7F95", lineHeight: 1.7, maxWidth: 260 }}>Professional mobile car wash covering all of Koura district, North Lebanon.</p><div style={{ display: "flex", gap: 8, marginTop: 12 }}><a href="#" style={{ display: "inline-flex", alignItems: "center", gap: 6, background: C.charcoal, color: "white", padding: "6px 12px", borderRadius: 8, textDecoration: "none", fontSize: 10 }}>{Ic.apple}<span style={{ fontFamily: "Poppins", fontWeight: 600 }}>App Store</span></a><a href="#" style={{ display: "inline-flex", alignItems: "center", gap: 6, background: C.charcoal, color: "white", padding: "6px 12px", borderRadius: 8, textDecoration: "none", fontSize: 10 }}>{Ic.gplay}<span style={{ fontFamily: "Poppins", fontWeight: 600 }}>Google Play</span></a></div></div>
            {[{t:"Services",l:["Inside Wash","Outside Wash","Simple Wash","Headlights","Fleet Plans"]},{t:"Plans",l:["2 Washes/Month","3 Washes/Month","4 Washes/Month","Family Plan"]},{t:"Contact",l:["WhatsApp","Instagram","TikTok","Facebook","Google Maps"]}].map(col => <div key={col.t}><h4 style={{ fontFamily: "Poppins", fontSize: 12, fontWeight: 700, color: "white", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>{col.t}</h4>{col.l.map(l => <a key={l} href="#" onClick={(e) => { e.preventDefault(); if(l==="WhatsApp") openWA(); }} style={{ display: "block", fontSize: 12, color: "#6B7F95", textDecoration: "none", padding: "3px 0" }} onMouseEnter={e=>e.target.style.color="white"} onMouseLeave={e=>e.target.style.color="#6B7F95"}>{l}</a>)}</div>)}
          </div>
          <hr style={{ border: "none", borderTop: "1px solid rgba(255,255,255,.05)", marginBottom: 16 }}/>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}><span style={{ fontSize: 11, color: "#6B7F95" }}>© 2026 Doorstep Car Wash SARL. Koura, North Lebanon.</span><span style={{ fontSize: 11, color: "#4A6178" }}>Tue–Sat: 8:30 AM – 6:00 PM | Sun: 8:00 AM – 12:00 PM</span></div>
        </div>
      </footer>

      {/* WAB FAB */}
      <a href="#" onClick={(e) => { e.preventDefault(); openWA(); }} title="Book on WhatsApp" style={{ position: "fixed", bottom: 22, right: 22, zIndex: 999, width: 58, height: 58, borderRadius: "50%", background: C.whatsapp, color: "white", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 6px 24px rgba(37,211,102,.4)", animation: "pulse 3s infinite", textDecoration: "none", cursor: "pointer" }}>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
