function useReveal() {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold: 0.12 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, v];
}
function Reveal({ children, delay = 0 }) {
  const [ref, v] = useReveal();
  return <div ref={ref} style={{ opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(30px)", transition: `all .7s cubic-bezier(.22,1,.36,1) ${delay}s` }}>{children}</div>;
}
function Counter({ end, suffix = "", prefix = "" }) {
  const [c, setC] = useState(0); const ref = useRef(null); const started = useRef(false);
  useEffect(() => { const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting && !started.current) { started.current = true; let v = 0; const step = end / 60; const t = setInterval(() => { v += step; if (v >= end) { setC(end); clearInterval(t); } else setC(Math.floor(v)); }, 16); } }, { threshold: 0.5 }); if (ref.current) obs.observe(ref.current); return () => obs.disconnect(); }, [end]);
  return <span ref={ref}>{prefix}{c}{suffix}</span>;
}
